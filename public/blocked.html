<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>站点已被拦截</title>
    <style>
        :root {
            --bg-start: #f9fafb;
            --bg-end: #dbeafe;
            --ink-strong: #0f172a;
            --ink-normal: #334155;
            --ink-soft: #64748b;
            --accent: #0f766e;
            --accent-strong: #115e59;
            --glass: rgba(255, 255, 255, 0.8);
            --glass-border: rgba(255, 255, 255, 0.55);
            --shadow: 0 20px 50px rgba(15, 23, 42, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            min-height: 100vh;
            color: var(--ink-normal);
            display: grid;
            place-items: center;
            background:
                radial-gradient(circle at 15% 18%, rgba(16, 185, 129, 0.24) 0 28%, transparent 40%),
                radial-gradient(circle at 85% 20%, rgba(14, 165, 233, 0.22) 0 24%, transparent 40%),
                linear-gradient(150deg, var(--bg-start), var(--bg-end));
            padding: 24px;
        }

        .container {
            width: min(92vw, 560px);
            background: var(--glass);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 34px;
            box-shadow: var(--shadow);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            inset: -60% auto auto -45%;
            width: 260px;
            height: 260px;
            background: radial-gradient(circle, rgba(16, 185, 129, 0.3), transparent 70%);
            pointer-events: none;
        }

        .icon-wrap {
            width: 88px;
            height: 88px;
            margin: 0 auto 18px;
            border-radius: 22px;
            background: linear-gradient(145deg, #0f766e, #14b8a6);
            display: grid;
            place-items: center;
            box-shadow: 0 12px 28px rgba(15, 118, 110, 0.35);
        }

        .icon-wrap svg {
            width: 44px;
            height: 44px;
            fill: #f8fafc;
        }

        h1 {
            font-size: clamp(24px, 4vw, 30px);
            color: var(--ink-strong);
            letter-spacing: 0.02em;
            margin-bottom: 10px;
        }

        .subtitle {
            color: var(--ink-soft);
            font-size: 15px;
            line-height: 1.7;
            margin: 0 auto 22px;
            max-width: 430px;
        }

        .site-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #0f766e;
            border: 1px solid rgba(15, 118, 110, 0.25);
            border-radius: 999px;
            padding: 7px 14px;
            background: rgba(20, 184, 166, 0.1);
            margin-bottom: 24px;
        }

        .note {
            text-align: left;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.72);
            border: 1px solid #e2e8f0;
            padding: 14px 16px;
            margin-bottom: 24px;
            color: #475569;
            font-size: 14px;
            line-height: 1.7;
        }

        .actions {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            border: 0;
            border-radius: 12px;
            padding: 11px 18px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.18s ease, box-shadow 0.18s ease, background-color 0.18s ease;
        }

        .btn-primary {
            color: #ffffff;
            background: var(--accent);
            box-shadow: 0 8px 20px rgba(15, 118, 110, 0.28);
        }

        .btn-primary:hover {
            background: var(--accent-strong);
            transform: translateY(-1px);
        }

        .btn-secondary {
            color: #334155;
            background: #ffffff;
            border: 1px solid #dbe3ee;
        }

        .btn-secondary:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 16px rgba(148, 163, 184, 0.2);
        }

        @media (max-width: 520px) {
            .container {
                padding: 24px 18px;
                border-radius: 18px;
            }

            .subtitle {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon-wrap" aria-hidden="true">
            <svg viewBox="0 0 24 24">
                <path d="M12 2 4 5v6.6c0 5.15 3.43 9.9 8 11.4 4.57-1.5 8-6.25 8-11.4V5l-8-3Zm-1.1 14.7-3.2-3.2 1.4-1.4 1.8 1.8 4-4 1.4 1.4-5.4 5.4Z" />
            </svg>
        </div>
        <h1>此网站已被拦截</h1>
        <p class="subtitle">MindFence 已按你的专注规则阻止访问。你可以返回继续任务，或在插件弹窗里调整拦截站点与管理密码。</p>

        <div class="site-pill" id="siteInfo">已触发专注保护</div>

        <div class="note">
            <strong>提示：</strong>若你希望继续访问该网站，请在扩展弹窗中解锁管理权限后处理：
            1. 从拦截列表移除该域名
            2. 或修改管理密码后再由自己决定何时放行
        </div>

        <div class="actions">
            <button class="btn-primary" onclick="goBack()">返回上一页</button>
            <button class="btn-secondary" onclick="goHome()">前往常用首页</button>
        </div>
    </div>
    
    <script>
        function getBlockedHost() {
            if (!document.referrer) {
                return ''
            }

            try {
                return new URL(document.referrer).host
            } catch {
                return ''
            }
        }

        const blockedHost = getBlockedHost()
        if (blockedHost) {
            const siteInfo = document.getElementById('siteInfo')
            siteInfo.textContent = `已拦截：${blockedHost}`
        }

        function goBack() {
            if (window.history.length > 1) {
                window.history.back()
            } else {
                window.location.href = 'https://www.bing.com'
            }
        }

        function goHome() {
            window.location.href = 'https://www.bing.com'
        }
    </script>
</body>
</html>
