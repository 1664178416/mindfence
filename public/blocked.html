<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>站点已被拦截</title>
    <style>
        :root {
            --bg-start: #f9fafb;
            --bg-end: #dbeafe;
            --ink-strong: #0f172a;
            --ink-normal: #334155;
            --ink-soft: #64748b;
            --ink-quote: #1e293b;
            --accent: #0f766e;
            --accent-strong: #115e59;
            --glass: rgba(255, 255, 255, 0.8);
            --glass-border: rgba(255, 255, 255, 0.55);
            --shadow: 0 20px 50px rgba(15, 23, 42, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            min-height: 100vh;
            color: var(--ink-normal);
            display: grid;
            place-items: center;
            background:
                radial-gradient(circle at 15% 18%, rgba(16, 185, 129, 0.24) 0 28%, transparent 40%),
                radial-gradient(circle at 85% 20%, rgba(14, 165, 233, 0.22) 0 24%, transparent 40%),
                linear-gradient(150deg, var(--bg-start), var(--bg-end));
            padding: 24px;
        }

        .container {
            width: min(92vw, 560px);
            background: var(--glass);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 34px;
            box-shadow: var(--shadow);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            inset: -60% auto auto -45%;
            width: 260px;
            height: 260px;
            background: radial-gradient(circle, rgba(16, 185, 129, 0.3), transparent 70%);
            pointer-events: none;
        }

        .icon-wrap {
            width: 88px;
            height: 88px;
            margin: 0 auto 18px;
            border-radius: 22px;
            background: linear-gradient(145deg, #0f766e, #14b8a6);
            display: grid;
            place-items: center;
            box-shadow: 0 12px 28px rgba(15, 118, 110, 0.35);
        }

        .icon-wrap svg {
            width: 44px;
            height: 44px;
            fill: #f8fafc;
        }

        h1 {
            font-size: clamp(24px, 4vw, 30px);
            color: var(--ink-strong);
            letter-spacing: 0.02em;
            margin-bottom: 10px;
        }

        .subtitle {
            color: var(--ink-soft);
            font-size: 15px;
            line-height: 1.7;
            margin: 0 auto 22px;
            max-width: 430px;
        }

        .site-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #0f766e;
            border: 1px solid rgba(15, 118, 110, 0.25);
            border-radius: 999px;
            padding: 7px 14px;
            background: rgba(20, 184, 166, 0.1);
            margin-bottom: 24px;
        }

        .note {
            position: relative;
            text-align: left;
            border-radius: 16px;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.95), rgba(248, 250, 252, 0.94));
            border: 1px solid #dfe7f2;
            padding: 18px 18px 18px 20px;
            margin-bottom: 22px;
            box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
        }

        .note::before {
            content: '“';
            position: absolute;
            top: -8px;
            left: 12px;
            font-size: 48px;
            color: rgba(15, 118, 110, 0.2);
            line-height: 1;
            font-family: Georgia, 'Times New Roman', serif;
        }

        .quote-label {
            display: inline-block;
            font-size: 12px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #0f766e;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .quote-text {
            display: block;
            color: var(--ink-quote);
            font-size: 20px;
            line-height: 1.7;
            font-family: 'STKaiti', 'KaiTi', 'Songti SC', 'Noto Serif CJK SC', serif;
        }

        .actions {
            display: flex;
            justify-content: center;
            margin-top: 2px;
        }

        button {
            border: 0;
            border-radius: 12px;
            padding: 11px 18px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.18s ease, box-shadow 0.18s ease, background-color 0.18s ease;
        }

        .btn-primary {
            color: #ffffff;
            background: var(--accent);
            box-shadow: 0 8px 20px rgba(15, 118, 110, 0.28);
        }

        .btn-primary:hover {
            background: var(--accent-strong);
            transform: translateY(-1px);
        }

        @media (max-width: 520px) {
            .container {
                padding: 24px 18px;
                border-radius: 18px;
            }

            .subtitle {
                font-size: 14px;
            }

            .quote-text {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon-wrap" aria-hidden="true">
            <svg viewBox="0 0 24 24">
                <path d="M12 2 4 5v6.6c0 5.15 3.43 9.9 8 11.4 4.57-1.5 8-6.25 8-11.4V5l-8-3Zm-1.1 14.7-3.2-3.2 1.4-1.4 1.8 1.8 4-4 1.4 1.4-5.4 5.4Z" />
            </svg>
        </div>
        <h1>此网站已被拦截</h1>
        <p class="subtitle">MindFence 已按你的专注规则阻止访问。先稳住注意力，再决定下一步。</p>

        <div class="site-pill" id="siteInfo">已触发专注保护</div>

        <div class="note" id="quoteBox">
            <strong class="quote-label" id="quoteLead">警世名言</strong>
            <span class="quote-text" id="quoteText">请先停下来，给自己 3 秒钟，确认现在要做的事。</span>
        </div>

        <div class="actions">
            <button class="btn-primary" onclick="showRandomQuote()">换一句</button>
        </div>
    </div>
    
    <script>
        function getBlockedHost() {
            if (!document.referrer) {
                return ''
            }

            try {
                return new URL(document.referrer).host
            } catch {
                return ''
            }
        }

        const warningQuotes = [
            '你不能同时追两只兔子。',
            '凡事预则立，不预则废。',
            '与其临渊羡鱼，不如退而结网。',
            '拖延是最温柔的自我欺骗。',
            '真正的自由，是能控制自己的注意力。',
            '你今天的专注，会变成明天的底气。',
            '把时间花在哪里，人生就长在哪里。',
            '先完成，再完美。',
            '没有纪律，灵感只是借口。',
            '一时放纵，往往换来长久焦虑。',
            '真正拉开差距的，是无人监督时的选择。',
            '把每个 25 分钟守住，结果会替你说话。',
            '专注不是苦行，而是对目标的尊重。',
            '注意力是稀缺资产，请投资在重要的事上。'
        ]

        function showRandomQuote() {
            const quoteText = document.getElementById('quoteText')
            const randomIndex = Math.floor(Math.random() * warningQuotes.length)
            quoteText.textContent = warningQuotes[randomIndex]
        }

        const blockedHost = getBlockedHost()
        if (blockedHost) {
            const siteInfo = document.getElementById('siteInfo')
            siteInfo.textContent = `已拦截：${blockedHost}`
        }

        showRandomQuote()
    </script>
</body>
</html>
